# Render Blueprint — one-click deploy of Luxe Grand (web service + Postgres).
# In Render: New → Blueprint → pick this repo → Apply.
databases:
  - name: luxegrand-db
    plan: free
    databaseName: luxegrand
    user: luxegrand

services:
  - type: web
    name: luxegrand
    runtime: node
    plan: free
    # Install dev deps (vite/tsc/prisma) explicitly — NODE_ENV=production would skip them.
    buildCommand: >-
      sed -i 's/provider = "sqlite"/provider = "postgresql"/' backend/prisma/schema.prisma &&
      npm install --include=dev --prefix frontend &&
      npm run build --prefix frontend &&
      npm install --include=dev --prefix backend &&
      npm run db:generate --prefix backend &&
      npm run build --prefix backend
    # Sync the schema to the DB on every deploy, then start the API (which also serves the UI).
    startCommand: >-
      cd backend &&
      npx prisma db push --skip-generate --accept-data-loss &&
      node dist/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: luxegrand-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random secret
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Set these in the Render dashboard after the first deploy:
      - key: FRONTEND_URL
        sync: false # → your live URL, e.g. https://luxegrand.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
